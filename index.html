  .cover-bowl{position:absolute;right:34px;bottom:24px;width:150px;height:135px;opacity:.5;pointer-events:none;}
  .cover-code{position:absolute;top:16px;right:20px;font-family:monospace;font-size:11px;letter-spacing:.18em;color:rgba(250,225,210,.55);}

  .obj .criterio .k{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--verde);font-weight:800;}

  .tag{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-left:8px;vertical-align:middle;}

  .mark{margin-top:14px;padding-top:12px;border-top:1px dashed var(--linea);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

  .mark-meta{font-size:12px;font-weight:700;color:var(--verde-2);}

  .reporte{margin-top:18px;background:var(--verde);color:#fff;border-radius:8px;padding:18px 22px;}

  .reporte p{font-size:14px;margin-top:8px;} .reporte ul{list-style:none;margin-top:6px;}
  .reporte li{font-size:13.5px;padding:5px 0 5px 18px;position:relative;color:var(--beige);}
  .reporte li::before{content:"";position:absolute;left:0;top:11px;width:7px;height:7px;background:var(--naranja);transform:rotate(45deg);}
  .reporte strong{color:#fff;}
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px;}
  .kpi{background:var(--papel);border:1px solid var(--linea);border-top:4px solid var(--naranja);border-radius:6px;padding:15px 17px;}
  .kpi h4{font-size:14px;color:var(--verde);font-weight:800;} .kpi .det{font-size:12.5px;color:#52574e;margin-top:6px;}
  .kpi .meta{display:inline-block;margin-top:9px;font-size:12px;font-weight:800;color:#fff;background:var(--verde);padding:3px 10px;border-radius:20px;}

  .brand{margin-top:50px;border-top:2px solid var(--verde);padding-top:20px;}
  .footer-note{font-size:11px;color:#8a8f86;text-align:center;letter-spacing:.04em;}

  .rv{opacity:0;transform:translateY(14px);animation:rv .7s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes rv{to{opacity:1;transform:none;}}
  @media(max-width:760px){.meta-strip{grid-template-columns:1fr 1fr;}.ficha,.kpis{grid-template-columns:1fr;}.obj .grid{grid-template-columns:1fr 1fr;}.cover{padding:34px 22px 28px;}.cover-bowl{display:none;}.wrap{padding:0 18px 60px;}}
  @media print{body{background:#fff;}.langbar{display:none;}.cover{-webkit-print-color-adjust:exact;print-color-adjust:exact;}.rv{animation:none;opacity:1;transform:none;}.mark,#syncNote{display:none;}section,.obj,.kpi{break-inside:avoid;}}
</style>

      const n=chk.dataset.n;
      if(fbReady){
        if(chk.checked) update(ref(db,'programas/PGMTT0001/objetivos/'+n),{done:true,fecha:new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short'})});
        else set(ref(db,'programas/PGMTT0001/objetivos/'+n),{done:false});
      } else { paintAll(lastData={...lastData, objetivos:{...(lastData.objetivos||{}), [n]: chk.checked?{done:true}:{done:false}}}); }
    }));
  }
  function paintAll(data){
    data=data||{}; const d=T[lang]; const now=new Date();
    let doneCount=0;
    for(let n=1;n<=TOTAL;n++){
      const o=data.objetivos?data.objetivos[n]:null, done=!!(o&&o.done);
      const chk=$('.objchk[data-n="'+n+'"]'); if(!chk) continue;
      chk.checked=done; chk.closest('.obj').classList.toggle('done',done);
      const meta=$('[data-meta="'+n+'"]'); meta.textContent=done?(d.done+(o.fecha?' · '+o.fecha:'')):'';
      const venc=$('[data-venc="'+n+'"]'); if(venc) venc.style.display=(!done && now>new Date(FISO[n]))?'inline-block':'none';
      if(done) doneCount++;
    }
    const op=Math.round(doneCount/TOTAL*100), tp=timePct();
    $('#avBar').style.width=op+'%'; $('#avLabel').textContent=doneCount+'/'+TOTAL+' · '+op+'%';
    $('#avTimeBar').style.width=tp+'%'; $('#avTimeLabel').textContent=tp+'%';
    const r=$('#ritmo'); r.className='ritmo';
    if(tp-op>15){ r.textContent=d.ritmo_at; r.classList.add('atras'); }
    else if(op-tp>15){ r.textContent=d.ritmo_ad; r.classList.add('adel'); }
    else r.textContent=d.ritmo_ok;
  }
  function applyLang(){
    const d=T[lang];
    document.body.classList.toggle('th', lang==='th');
    document.documentElement.lang = lang;
    $$('[data-i18n]').forEach(el=>{ const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.innerHTML=d[k]; });
    $$('.estado-sel').forEach(sel=>{ sel.options[0].text=d.est_no; sel.options[1].text=d.est_curso; sel.options[2].text=d.est_pausa; sel.options[3].text=d.est_comp; });
    $('#syncNote').textContent = fbReady? d.sync_ok : ($('#syncNote').dataset.off==='1'? d.sync_off : d.sync_con);
    renderObjectives(); renderKPIs();
    $$('.langbar button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  }

  $$('.langbar button').forEach(b=>b.addEventListener('click',()=>{ lang=b.dataset.lang; try{localStorage.setItem('pgmtt_lang',lang);}catch(e){} applyLang(); }));
  $$('.estado-sel').forEach(sel=>sel.addEventListener('change',()=>{ colorEstado(sel); $$('.estado-sel').forEach(o=>{o.value=sel.value;colorEstado(o);}); if(fbReady) update(ref(db,'programas/PGMTT0001'),{estado:sel.value}); }));

  applyLang(); $$('.estado-sel').forEach(colorEstado);

  try{
    const app=initializeApp(firebaseConfig); db=getDatabase(app); fbReady=true;
    $('#syncNote').textContent=T[lang].sync_ok; $('#syncNote').className='ok';
    onValue(ref(db,'programas/PGMTT0001'),snap=>{
      lastData=snap.val()||{};
      const est=lastData.estado||'no_iniciado';
      $$('.estado-sel').forEach(s=>{s.value=est;colorEstado(s);});
      paintAll(lastData);
    }, ()=>{ fbReady=false; const s=$('#syncNote'); s.dataset.off='1'; s.textContent=T[lang].sync_off; s.className='off'; });
  }catch(e){ const s=$('#syncNote'); s.dataset.off='1'; s.textContent=T[lang].sync_off; s.className='off'; console.warn('Firebase:',e); }

  $$('.rv').forEach((el,i)=>{el.style.animationDelay=(i*0.05)+'s';});
</script>
</body>
</html>
